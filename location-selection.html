<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Location - Smart Parking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
        }

        .header h1 {
            color: #7c3aed;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #6b7280;
            font-size: 16px;
        }

        .locations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .location-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            position: relative;
        }

        .location-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .location-icon {
            font-size: 64px;
            color: #7c3aed;
            margin-bottom: 20px;
        }

        .location-name {
            font-size: 24px;
            font-weight: 700;
            color: #1e1b4b;
            margin-bottom: 10px;
        }

        .location-desc {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .direction-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .direction-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        @media (max-width: 768px) {
            .locations-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-parking"></i> Smart Parking System</h1>
            <p>Select your parking location</p>
        </div>

        <div class="locations-grid">
            <div class="location-card" onclick="selectLocation('rathinam_main_gate', 'Rathinam Main Gate')">
                <div class="location-icon">
                    <i class="fas fa-building"></i>
                </div>
                <div class="location-name">Rathinam Main Gate</div>
                <div class="location-desc">Main entrance parking area</div>
                <button class="direction-btn" onclick="event.stopPropagation(); openMainGate()">
                    📍 Direction
                </button>
            </div>

            <div class="location-card" onclick="selectLocation('rathinam_gate1', 'Rathinam Gate 1')">
                <div class="location-icon">
                    <i class="fas fa-door-open"></i>
                </div>
                <div class="location-name">Rathinam Gate 1</div>
                <div class="location-desc">Gate 1 parking facility</div>
                <button class="direction-btn" onclick="event.stopPropagation(); openGate1()">
                    📍 Direction
                </button>
            </div>

            <div class="location-card" onclick="selectLocation('rathinam_gate3', 'Rathinam Gate 3')">
                <div class="location-icon">
                    <i class="fas fa-warehouse"></i>
                </div>
                <div class="location-name">Rathinam Gate 3</div>
                <div class="location-desc">Gate 3 parking zone</div>
                <button class="direction-btn" onclick="event.stopPropagation(); openGate3()">
                    📍 Direction
                </button>
            </div>
        </div>
    </div>

    <script>
        function selectLocation(locationId, locationName) {
            localStorage.setItem('selectedLocation', locationId);
            localStorage.setItem('selectedLocationName', locationName);
            window.location.href = 'slots-view.html';
        }

        function openMainGate() {
            window.open("https://maps.app.goo.gl/6yWRXfrPBx8Jo5vx8", "_blank");
        }

        function openGate1() {
            window.open("https://maps.app.goo.gl/KCVUfQeW38kZcfmm8", "_blank");
        }

        function openGate3() {
            window.open("https://maps.app.goo.gl/eWwEB45cqHszhrJB8", "_blank");
        }
    </script>
    <script type="module" src="chatbot.js"></script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
