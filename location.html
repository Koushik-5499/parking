<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Location - Smart Metro Parking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .location-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
        }

        .header h1 {
            color: #7c3aed;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #6b7280;
            font-size: 16px;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .user-email {
            color: #1e1b4b;
            font-weight: 600;
        }

        .logout-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .locations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .location-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .location-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .location-icon {
            font-size: 48px;
            color: #7c3aed;
            margin-bottom: 15px;
        }

        .location-name {
            font-size: 20px;
            font-weight: 700;
            color: #1e1b4b;
            margin-bottom: 10px;
        }

        .location-details {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .location-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #06b6d4;
        }

        .stat-label {
            font-size: 12px;
            color: #6b7280;
            margin-top: 5px;
        }

        .direction-btn {
            background-color: rgba(255, 255, 255, 0.1);
            color: #1e1b4b;
            border: 1px solid #d1d5db;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
            transition: all 0.2s;
            z-index: 10;
            position: relative;
        }

        .direction-btn:hover {
            background-color: #e5e7eb;
            color: #7c3aed;
        }
    </style>
</head>

<body>
    <div class="location-container">
        <div class="header">
            <h1><i class="fas fa-map-marker-alt"></i> Select Parking Location</h1>
            <p>Choose your preferred parking location</p>
            <div class="user-info">
                <span class="user-email" id="userEmail">Loading...</span>
                <button class="logout-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>

        <div class="locations-grid">
            <div class="location-card" onclick="selectLocation('Rathinam Main Gate')">
                <div class="location-icon">
                    <i class="fas fa-building"></i>
                </div>
                <div class="location-name">Rathinam Main Gate</div>
                <div class="location-details">Main entrance parking area</div>
                <div class="location-stats">
                    <div class="stat">
                        <div class="stat-value" id="mainGateTotal">0</div>
                        <div class="stat-label">Total Slots</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="mainGateAvailable">0</div>
                        <div class="stat-label">Available</div>
                    </div>
                </div>
                <button class="direction-btn" onclick="event.stopPropagation(); openMainGate()">📍 Direction</button>
            </div>

            <div class="location-card" onclick="selectLocation('Rathinam Gate 1')">
                <div class="location-icon">
                    <i class="fas fa-parking"></i>
                </div>
                <div class="location-name">Rathinam Gate 1</div>
                <div class="location-details">East side parking facility</div>
                <div class="location-stats">
                    <div class="stat">
                        <div class="stat-value" id="gate1Total">0</div>
                        <div class="stat-label">Total Slots</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="gate1Available">0</div>
                        <div class="stat-label">Available</div>
                    </div>
                </div>
                <button class="direction-btn" onclick="event.stopPropagation(); openGate1()">📍 Direction</button>
            </div>

            <div class="location-card" onclick="selectLocation('Rathinam Gate 3')">
                <div class="location-icon">
                    <i class="fas fa-warehouse"></i>
                </div>
                <div class="location-name">Rathinam Gate 3</div>
                <div class="location-details">West side parking facility</div>
                <div class="location-stats">
                    <div class="stat">
                        <div class="stat-value" id="gate3Total">0</div>
                        <div class="stat-label">Total Slots</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="gate3Available">0</div>
                        <div class="stat-label">Available</div>
                    </div>
                </div>
                <button class="direction-btn" onclick="event.stopPropagation(); openGate3()">📍 Direction</button>
            </div>
        </div>
    </div>

    <script>
        function openMainGate() {
            window.open("https://maps.app.goo.gl/6yWRXfrPBx8Jo5vx8", "_blank")
        }

        function openGate1() {
            window.open("https://maps.app.goo.gl/KCVUfQeW38kZcfmm8", "_blank")
        }

        function openGate3() {
            window.open("https://maps.app.goo.gl/eWwEB45cqHszhrJB8", "_blank")
        }
    </script>
    <script type="module" src="location-script.js"></script>
    <script type="module" src="chatbot.js"></script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>

</html>
