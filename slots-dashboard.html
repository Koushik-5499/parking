<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking Slots - Smart Metro Parking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
        }

        .header h1 {
            color: #7c3aed;
            font-size: 20px;
        }

        .back-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .legend {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .legend-box {
            width: 30px;
            height: 30px;
            border-radius: 6px;
        }

        .legend-box.available {
            background: #22c55e;
        }

        .legend-box.pending {
            background: #f59e0b;
        }

        .legend-box.occupied {
            background: #ef4444;
        }

        .legend-label {
            font-weight: 600;
            color: #1e1b4b;
        }

        .slots-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
        }

        .slots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .slot-card {
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
        }

        .slot-card.available {
            background: #dcfce7;
            border-color: #22c55e;
        }

        .slot-card.pending {
            background: #fef3c7;
            border-color: #f59e0b;
        }

        .slot-card.occupied {
            background: #fee2e2;
            border-color: #ef4444;
            cursor: not-allowed;
        }

        .slot-card.available:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.3);
        }

        .slot-number {
            font-size: 24px;
            font-weight: 700;
            color: #1e1b4b;
            margin-bottom: 8px;
        }

        .slot-status {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #6b7280;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
        }

        .modal-title {
            font-size: 24px;
            color: #7c3aed;
            margin-bottom: 20px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            color: #1e1b4b;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: #6b7280;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1 id="locationTitle">Loading...</h1>
            <button class="back-btn" onclick="window.location.href='locations.html'">
                <i class="fas fa-arrow-left"></i> Back
            </button>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-box available"></div>
                <span class="legend-label">Available</span>
            </div>
            <div class="legend-item">
                <div class="legend-box pending"></div>
                <span class="legend-label">Pending (Waiting)</span>
            </div>
            <div class="legend-item">
                <div class="legend-box occupied"></div>
                <span class="legend-label">Occupied</span>
            </div>
        </div>

        <div class="slots-container">
            <div class="slots-grid" id="slotsGrid">
                <p style="text-align: center; color: #9ca3af; grid-column: 1/-1;">
                    <i class="fas fa-spinner fa-spin"></i> Loading slots...
                </p>
            </div>
        </div>
    </div>

    <!-- Booking Modal -->
    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <h2 class="modal-title">Book Parking Slot</h2>
            <form id="bookingForm">
                <div class="input-group">
                    <label>Slot Number</label>
                    <input type="text" id="modalSlotNumber" disabled>
                </div>
                <div class="input-group">
                    <label>Name</label>
                    <input type="text" id="bookingName" pattern="^[A-Za-z\s]+$" title="Please enter only letters (no numbers or symbols)" oninput="this.value = this.value.replace(/[^A-Za-z\s]/g, '');" required>
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="bookingPhone" pattern="[0-9]{10}" maxlength="10" title="Please enter exactly 10 digits" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);" required>
                </div>

                <div class="input-group" style="margin-bottom: 20px;">
                    <label>Vehicle Number</label>
                    <input type="text" id="bookingVehicleNumber" placeholder="e.g., TN01AB1234" pattern="^[A-Z]{2}[0-9]{2}[A-Z]{2}[0-9]{4}$" title="Format: 2 Letters, 2 Numbers, 2 Letters, 4 Numbers (e.g., TN01AB1234)" oninput="this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');" maxlength="10" required>
                    <small style="display: block; color: #06b6d4; font-weight: bold; margin-top: 8px;">* Per Hour: ₹80</small>
                </div>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-check"></i> Book Slot
                </button>
                <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
            </form>
        </div>
    </div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="module" src="slots-dashboard-script.js"></script>
    <script type="module" src="chatbot.js"></script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>

</html>
