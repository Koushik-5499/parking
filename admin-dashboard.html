<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Smart Metro Parking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh; padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 20px 30px; border-radius: 16px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 8px 32px rgba(102,126,234,0.5);
        }
        .header h1 { color: white; font-size: 24px; }
        .logout-btn {
            background: rgba(255,255,255,0.2); color: white;
            border: 2px solid rgba(255,255,255,0.4); padding: 10px 20px;
            border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.3s;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.35); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { padding: 25px; border-radius: 16px; text-align: center; color: white; box-shadow: 0 8px 24px rgba(0,0,0,0.3); transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-4px); }
        .stat-card.total    { background: linear-gradient(135deg, #667eea, #764ba2); }
        .stat-card.available{ background: linear-gradient(135deg, #11998e, #38ef7d); }
        .stat-card.booked   { background: linear-gradient(135deg, #f7971e, #ffd200); }
        .stat-card.occupied { background: linear-gradient(135deg, #f953c6, #b91d73); }
        .stat-card i { font-size: 36px; margin-bottom: 10px; opacity: 0.9; }
        .stat-value { font-size: 36px; font-weight: 700; margin: 10px 0; }
        .stat-label { font-size: 14px; opacity: 0.85; }
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .section {
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
            padding: 25px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); color: white;
        }
        .section-title { font-size: 20px; color: #e0e7ff; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .location-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn {
            padding: 10px 20px; border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08); border-radius: 10px; cursor: pointer;
            font-weight: 600; color: #c4b5fd; transition: all 0.3s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2); color: white;
            border-color: transparent; box-shadow: 0 4px 15px rgba(102,126,234,0.5);
        }
        .slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 12px; }
        .slot-mini { padding: 14px 10px; border-radius: 10px; text-align: center; font-weight: 700; font-size: 13px; cursor: pointer; transition: transform 0.2s; }
        .slot-mini:hover { transform: scale(1.05); }
        .slot-mini.available { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; }
        .slot-mini.pending   { background: linear-gradient(135deg, #f7971e, #ffd200); color: #1a1a2e; }
        .slot-mini.occupied  { background: linear-gradient(135deg, #f953c6, #b91d73); color: white; }
        #reader { border-radius: 10px; overflow: hidden; }
        .scan-result { margin-top: 20px; padding: 20px; border-radius: 10px; display: none; }
        .scan-result.success { background: rgba(17,153,142,0.2); border: 2px solid #38ef7d; display: block; }
        .scan-result.error   { background: rgba(249,83,198,0.2); border: 2px solid #f953c6; display: block; }
        .result-title { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
        .result-title.success { color: #38ef7d; }
        .result-title.error   { color: #f953c6; }
        @media (max-width: 1024px) { .main-content { grid-template-columns: 1fr; } }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-shield-alt"></i> Admin Dashboard</h1>
            <button class="logout-btn" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>

        <div class="stats-grid">
            <div class="stat-card total">
                <i class="fas fa-parking"></i>
                <div class="stat-value" id="totalSlots">0</div>
                <div class="stat-label">Total Slots</div>
            </div>
            <div class="stat-card available">
                <i class="fas fa-check-circle"></i>
                <div class="stat-value" id="availableSlots">0</div>
                <div class="stat-label">Available</div>
            </div>
            <div class="stat-card booked">
                <i class="fas fa-clock"></i>
                <div class="stat-value" id="bookedSlots">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card occupied">
                <i class="fas fa-car"></i>
                <div class="stat-value" id="occupiedSlots">0</div>
                <div class="stat-label">Occupied</div>
            </div>
        </div>

        <div class="main-content">
            <div class="section">
                <h2 class="section-title">
                    <i class="fas fa-th"></i> Live Slot View
                </h2>
                <div class="location-tabs">
                    <button class="tab-btn active" onclick="switchLocation('rathinam_main_gate')">Main Gate</button>
                    <button class="tab-btn" onclick="switchLocation('rathinam_gate1')">Gate 1</button>
                    <button class="tab-btn" onclick="switchLocation('rathinam_gate3')">Gate 3</button>
                </div>
                <div class="slots-grid" id="slotsView">
                    <p style="text-align: center; color: #9ca3af; grid-column: 1/-1;">
                        <i class="fas fa-spinner fa-spin"></i> Loading...
                    </p>
                </div>
            </div>

            <div class="section">
                <h2 class="section-title">
                    <i class="fas fa-qrcode"></i> <strong>Scanner & Code Entry</strong>
                </h2>
                <button id="toggleScannerBtn"
                    style="background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; width: 100%; justify-content: center; margin-bottom: 20px;">
                    <i class="fas fa-camera"></i> Open QR Code Scanner
                </button>
                <div id="reader-container" style="display: none; margin-bottom: 20px;">
                    <div id="reader"></div>
                </div>

                <div style="border-top: 2px dashed #e5e7eb; margin: 20px 0;"></div>

                <h3 style="font-size: 16px; margin-bottom: 10px; color: #e0e7ff; font-weight: 800; letter-spacing: 0.3px;"><strong>Manual Code Entry</strong></h3>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="text" id="manualCodeInput" placeholder="Enter Booking ID"
                        style="flex: 1; padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-size: 14px;">
                    <button id="manualCodeSubmit"
                        style="background: #38bdf8; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: 600; cursor: pointer;">
                        Submit
                    </button>
                </div>
                <div id="scanResult" class="scan-result"></div>
            </div>

            <!-- Export Reports Section -->
            <div class="section" style="grid-column: 1 / -1;">
                <h2 class="section-title">
                    <i class="fas fa-file-excel"></i> Export Reports
                </h2>
                <div
                    style="display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; flex-direction: row; justify-content: flex-start; align-items: flex-end;">
                    <div style="flex: 1; min-width: 200px;">
                        <label style="display: block; margin-bottom: 5px; color: #e0e7ff; font-weight: 800;"><strong>From Date & Time</strong></label>
                        <input type="datetime-local" id="reportFrom"
                            style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box;">
                    </div>
                    <div style="flex: 1; min-width: 200px;">
                        <label style="display: block; margin-bottom: 5px; color: #e0e7ff; font-weight: 800;"><strong>To Date & Time</strong></label>
                        <input type="datetime-local" id="reportTo"
                            style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box;">
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button id="showReportBtn"
                            style="background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; justify-content: center; height: 42px;">
                            <i class="fas fa-list"></i> Show Report
                        </button>
                        <button id="exportExcelBtn"
                            style="background: #38bdf8; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; justify-content: center; height: 42px;">
                            <i class="fas fa-download"></i> Export Excel
                        </button>
                    </div>
                </div>

                <div style="overflow-x: auto;">
                    <table id="reportTable"
                        style="width: 100%; border-collapse: collapse; margin-top: 20px; display: none;">
                        <thead>
                            <tr style="background-color: rgba(255, 255, 255, 0.1); color: #e0e7ff; text-align: left; font-weight: 800;">
                                <th style="padding: 12px; border-bottom: 2px solid rgba(255, 255, 255, 0.2);"><strong>Gate Name</strong></th>
                                <th style="padding: 12px; border-bottom: 2px solid rgba(255, 255, 255, 0.2);"><strong>Customer Name</strong></th>
                                <th style="padding: 12px; border-bottom: 2px solid rgba(255, 255, 255, 0.2);"><strong>Username</strong></th>
                                <th style="padding: 12px; border-bottom: 2px solid rgba(255, 255, 255, 0.2);"><strong>Phone No.</strong></th>
                                <th style="padding: 12px; border-bottom: 2px solid rgba(255, 255, 255, 0.2);"><strong>Vehicle</strong></th>
                                <th style="padding: 12px; border-bottom: 2px solid rgba(255, 255, 255, 0.2);"><strong>Entry</strong></th>
                                <th style="padding: 12px; border-bottom: 2px solid rgba(255, 255, 255, 0.2);"><strong>Exit</strong></th>
                                <th style="padding: 12px; border-bottom: 2px solid rgba(255, 255, 255, 0.2);"><strong>Slot</strong></th>
                                <th style="padding: 12px; border-bottom: 2px solid rgba(255, 255, 255, 0.2);"><strong>Payment</strong></th>
                                <th style="padding: 12px; border-bottom: 2px solid rgba(255, 255, 255, 0.2);"><strong>Method</strong></th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Slot Details Modal -->
    <div id="slotModal" class="modal"></div>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="module" src="admin-dashboard-script.js"></script>
</body>

</html>
